events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Büyük WebSocket mesajları için
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # ── HTTP → HTTPS yönlendirme + Certbot ──
    server {
        listen 80;
        server_name mahmutunmekani.yb.com.tr;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Sunucusu ──
    server {
        listen 443 ssl;
        server_name mahmutunmekani.yb.com.tr;

        ssl_certificate     /etc/letsencrypt/live/mahmutunmekani.yb.com.tr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mahmutunmekani.yb.com.tr/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # ── Backend API (REST) ──
        location /api {
            proxy_pass http://toplanti_backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS preflight için
            proxy_set_header Access-Control-Allow-Origin *;
        }

        # ── WebSocket (Toplantı Sinyalleşme) ──
        location /ws {
            proxy_pass http://toplanti_backend:8000;
            proxy_http_version 1.1;

            # WebSocket upgrade için zorunlu headerlar
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket bağlantısını uzun süre açık tut
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_buffering off;
        }

        # ── API Dokümantasyonu ──
        location /docs {
            proxy_pass http://toplanti_backend:8000/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass http://toplanti_backend:8000/openapi.json;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://toplanti_backend:8000/redoc;
            proxy_set_header Host $host;
        }

        # ── Frontend (Next.js) — tüm diğer istekler ──
        location / {
            proxy_pass http://toplanti_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
