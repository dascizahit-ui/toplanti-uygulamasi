# ============================================
# coturn TURN/STUN Sunucu Yapılandırması — Üretim
# ============================================

# Dinleme portu (UDP + TCP)
listening-port=3478

# TLS portu (TURNS)
tls-listening-port=5349

# Tüm arayüzlerde dinle
listening-ip=0.0.0.0

# Sunucunun gerçek dış IP adresi — DEĞİŞTİRMEYİN
external-ip=31.169.72.98

# Relay port aralığı
min-port=49152
max-port=49252

# ── Kimlik doğrulama ──
lt-cred-mech
user=toplanti_admin:guclu_sifre_123

# Realm (alan adı veya IP olabilir)
realm=mahmutunmekani.yb.com.tr

# ── Güvenlik ──
fingerprint
no-multicast-peers
no-cli

# Stale nonce süresi (saniye)
stale-nonce=600

# Maksimum bant genişliği (her oturum)
max-bps=3000000

# Toplam eş zamanlı oturum kotası
total-quota=100

# ── Loglama ──
# Verbose loglama (debug için):
# verbose
# Log dosyası (Docker stdout için kapalı):
# log-file=/var/log/turnserver.log
no-stdout-log

# ── Performans ──
# Sadece relay (TURN) işlemi, STUN'u da destekle
# Loopback ve private IP'lere relay engelle (güvenlik)
no-loopback-peers
# no-software-attribute
