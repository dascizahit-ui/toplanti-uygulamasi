# ============================================
# coturn TURN/STUN Sunucu Yapılandırması
# ============================================

# Dinleme portu
listening-port=3478

# TLS portu
tls-listening-port=5349

# Dinleme IP
listening-ip=0.0.0.0

# Harici IP (sunucu public IP ile değiştirin)
external-ip=31.169.72.98

# Relay IP aralığı
min-port=49152
max-port=49252

# Kimlik doğrulama
lt-cred-mech
user=toplanti_admin:guclu_sifre_123

# Realm
realm=mahmutunmekani.yb.com.tr

# Log dosyası
log-file=/var/log/turnserver.log

# Verbose loglama (debug için)
# verbose

# Daemon olarak çalıştırma
# daemon

# Fingerprint
fingerprint

# Stale nonce
stale-nonce=600

# Maksimum bps (her oturum için)
max-bps=1000000

# Toplam kota
total-quota=100

# CLI
cli-password=admin_sifre

# SSL sertifikaları (üretimde etkinleştirin)
# cert=/etc/ssl/certs/turn.pem
# pkey=/etc/ssl/private/turn.key

# Güvenlik
no-multicast-peers
no-cli
